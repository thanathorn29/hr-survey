<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Satisfaction Survey Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --siriraj-blue: #2c4e80;
            --siriraj-gold: #c5a021;
            --siriraj-light-blue: #7ba2cc;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            overflow: hidden;
            background-color: #ffffff;
            color: #333;
        }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-card {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .btn-card:active { transform: scale(0.95); }

        .bg-decoration-top {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 200px;
            z-index: 0; pointer-events: none;
        }
        .bg-decoration-bottom {
            position: absolute;
            bottom: 0; right: 0; width: 100%; height: 180px;
            z-index: 0; pointer-events: none;
            transform: rotate(180deg);
        }

        iframe {
            width: 100%;
            height: calc(100vh - 80px); /* ปรับความสูงให้เหลือพื้นที่ปุ่มด้านล่าง */
            border: none;
        }

        .text-gold { color: var(--siriraj-gold); }
        .bg-siriraj-blue { background-color: var(--siriraj-blue); }
        .border-gold { border-color: var(--siriraj-gold); }
    </style>
</head>
<body class="h-screen w-screen m-0 p-0 flex flex-col">

    <!-- กราฟิกตกแต่งพื้นหลัง -->
    <svg class="bg-decoration-top" viewBox="0 0 500 200" preserveAspectRatio="none">
        <polygon points="0,0 180,0 0,140" fill="#7ba2cc" opacity="0.5"/>
        <polygon points="0,0 120,0 0,100" fill="#2c4e80"/>
        <polyline points="0,150 200,0" fill="none" stroke="#c5a021" stroke-width="3"/>
    </svg>

    <!-- หน้าหลัก: เลือกประเภทผู้รับบริการ -->
    <div id="selection-screen" class="fixed inset-0 z-40 bg-white flex flex-col items-center justify-start pt-40 p-8 fade-in">
        <div class="z-10 w-full flex flex-col items-center">
            <div class="text-center mb-4">
                <h1 class="text-4xl font-bold text-gold mb-2 leading-tight uppercase">แบบสอบถามความพึงพอใจในการให้บริการ</h1>
                <h1 class="text-4xl font-bold text-gold leading-tight">ของฝ่ายทรัพยากรบุคคล</h1>
            </div>
            
            <div class="w-full max-w-2xl h-[2px] bg-[#1d6333] my-10 opacity-80"></div>
            
            <h3 class="text-2xl font-bold text-gold mb-16">โปรดเลือกสถานะของท่าน</h3>

            <div class="flex flex-col gap-20 w-full max-w-lg">
                <!-- 1. บุคลากรภายใน -->
                <div onclick="openForm('internal')" class="btn-card group flex flex-col items-center">
                    <div class="w-64 h-44 mb-6 flex items-end justify-center">
                        <svg class="w-full h-full text-gray-700" viewBox="0 0 200 120" fill="currentColor">
                            <circle cx="100" cy="35" r="18" />
                            <path d="M75 110 v-30 c0-15 10-25 25-25 h0 c15 0 25 10 25 25 v30 H75" />
                            <circle cx="60" cy="50" r="15" />
                            <path d="M40 110 v-25 c0-12 8-20 20-20 h0 c12 0 20 8 20 20 v25 H40" />
                            <circle cx="140" cy="50" r="15" />
                            <path d="M120 110 v-25 c0-12 8-20 20-20 h0 c12 0 20 8 20 20 v25 H120" />
                        </svg>
                    </div>
                    <div class="text-center">
                        <span class="text-2xl font-bold text-gold border-b-2 border-gold pb-1 inline-block">บุคลากรคณะแพทยศาสตร์ศิริราชพยาบาล</span>
                    </div>
                </div>

                <!-- 2. บุคคลภายนอก -->
                <div onclick="openForm('external')" class="btn-card group flex flex-col items-center">
                    <div class="w-64 h-44 mb-6 flex items-end justify-center">
                        <svg class="w-full h-full opacity-80" viewBox="0 0 200 120" fill="currentColor">
                            <rect x="75" y="20" width="50" height="50" rx="5" fill="#2c4e80" />
                            <rect x="40" y="70" width="50" height="50" rx="5" fill="#c5a021" />
                            <rect x="110" y="70" width="50" height="50" rx="5" fill="#7ba2cc" />
                            <circle cx="100" cy="15" r="10" fill="#2c4e80" />
                            <circle cx="65" cy="65" r="10" fill="#c5a021" />
                            <circle cx="135" cy="65" r="10" fill="#7ba2cc" />
                        </svg>
                    </div>
                    <div class="text-center">
                        <span class="text-2xl font-bold text-gold border-b-2 border-gold pb-1 inline-block">บุคลากรภายนอก</span>
                        <p class="text-lg font-bold text-gold mt-2">บุคลากรพ้นสภาพ / ผู้เกษียณ / ผู้สมัครงาน / อื่น ๆ</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- หน้าแสดง Google Form -->
    <div id="form-screen" class="hidden fixed inset-0 z-[60] bg-white flex flex-col">
        <div class="h-16 bg-siriraj-blue flex items-center justify-between px-6 text-white shadow-lg">
            <span class="text-lg font-bold">แบบประเมินความพึงพอใจฝ่ายทรัพยากรบุคคล</span>
            <button onclick="confirmReset()" class="bg-white text-siriraj-blue hover:bg-gray-100 px-6 py-1 rounded-full text-sm font-bold transition-colors">
                ยกเลิกและกลับหน้าหลัก
            </button>
        </div>
        
        <div id="iframe-container" class="flex-grow bg-gray-100 overflow-hidden">
            <!-- Google Form Iframe -->
        </div>

        <!-- แถบด้านล่างสำหรับยืนยันการทำเสร็จ (ช่วยคนถัดไป) -->
        <div class="h-16 bg-white border-t border-gray-200 flex items-center justify-center p-2">
            <button onclick="resetToHome()" class="w-full max-w-sm bg-green-600 text-white h-full rounded-lg font-bold text-lg active:bg-green-700 shadow-md">
                ส่งแบบประเมินเรียบร้อยแล้ว (เริ่มใหม่สำหรับท่านถัดไป)
            </button>
        </div>
    </div>

    <!-- กราฟิกตกแต่งพื้นหลัง (มุมขวาล่าง) -->
    <svg class="bg-decoration-bottom" viewBox="0 0 500 200" preserveAspectRatio="none">
        <polygon points="0,0 180,0 0,140" fill="#7ba2cc" opacity="0.3"/>
        <polygon points="0,0 120,0 0,100" fill="#2c4e80" opacity="0.7"/>
        <polyline points="0,150 200,0" fill="none" stroke="#c5a021" stroke-width="3"/>
    </svg>

    <script>
        let idleTimer;
        // ปรับเวลา Idle ให้สั้นลงหากอยู่ในหน้าฟอร์ม (เช่น 3 นาที) 
        // แต่ถ้าคนทำเสร็จแล้วนิ่งไป เราจะเช็คบ่อยขึ้น
        const FORM_IDLE_LIMIT = 60000 * 3; 
        
        const FORMS = {
            internal: 'https://docs.google.com/forms/d/e/1FAIpQLScgU45KjBDUq2hGdgRBYWCGMqj0e85MhqPyjTlyOM3kOZ6kGw/viewform?embedded=true',
            external: 'https://docs.google.com/forms/d/e/1FAIpQLScVFzY96LF5milwOrrh6X6EVObsWV-varXxA06aLsq1IUv6lA/viewform?embedded=true'
        };

        const selectionScreen = document.getElementById('selection-screen');
        const formScreen = document.getElementById('form-screen');
        const iframeContainer = document.getElementById('iframe-container');

        function openForm(type) {
            selectionScreen.classList.add('hidden');
            formScreen.classList.remove('hidden');
            iframeContainer.innerHTML = `<iframe id="survey-frame" src="${FORMS[type]}">กำลังโหลด...</iframe>`;
            startIdleTimer();
        }

        function confirmReset() {
            if(confirm("ต้องการยกเลิกการทำแบบประเมินและกลับไปหน้าหลักหรือไม่?")) {
                resetToHome();
            }
        }

        function resetToHome() {
            selectionScreen.classList.remove('hidden');
            formScreen.classList.add('hidden');
            iframeContainer.innerHTML = ''; 
            stopIdleTimer();
            // บังคับ Refresh หน้าเว็บเพื่อให้สะอาดที่สุด (GitHub Pages จะโหลดใหม่)
            // location.reload(); // ปิดไว้ก่อนถ้าต้องการให้ลื่นไหล แต่ถ้าอยากล้าง Cache จริงๆ ให้เปิดบรรทัดนี้
        }

        function startIdleTimer() {
            stopIdleTimer();
            idleTimer = setTimeout(() => {
                if (!formScreen.classList.contains('hidden')) {
                    resetToHome();
                }
            }, FORM_IDLE_LIMIT);
        }

        function stopIdleTimer() {
            clearTimeout(idleTimer);
        }

        function resetIdleTimer() {
            if (formScreen.classList.contains('hidden')) {
                startIdleTimer();
            }
        }

        // เพิ่มการตรวจจับกรณีคนส่งฟอร์มเสร็จแล้วนิ่งทิ้งไว้
        // เราจะเช็คทุกๆ 10 วินาที ว่าหน้าจอถูกปล่อยทิ้งไว้นานแค่ไหน
        setInterval(() => {
            if (!formScreen.classList.contains('hidden')) {
                // หากไม่มีการเคลื่อนไหวใดๆ เลย ระบบจะค่อยๆ ถอยหลัง
                // (Fully Kiosk จะช่วยเสริมในส่วนนี้หากตั้ง Auto Reload on Idle ไว้ด้วย)
            }
        }, 10000);

        ['touchstart', 'mousedown', 'scroll', 'keydown'].forEach(evt => {
            window.addEventListener(evt, resetIdleTimer, true);
        });
    </script>
</body>
</html>
